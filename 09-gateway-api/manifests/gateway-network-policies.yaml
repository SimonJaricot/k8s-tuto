# Autoriser le trafic entrant depuis le proxy Cilium Gateway (identité reserved:ingress)
# vers le frontend. Cilium Gateway utilise l'identité "ingress" (reserved) pour son proxy Envoy.
# On utilise fromEntities: ["ingress"] plutôt que fromEndpoints car le proxy
# tourne avec une identité réservée, pas comme un pod ordinaire.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-from-gateway
  namespace: frontend
spec:
  endpointSelector:
    matchLabels:
      app: frontend
  ingress:
    - fromEntities:
        - ingress
---
# Autoriser le trafic entrant depuis le proxy Cilium Gateway vers l'API
# La HTTPRoute api-route est dans ns/api mais sa Gateway est dans ns/frontend
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-from-gateway
  namespace: api
spec:
  endpointSelector:
    matchLabels:
      app: api
  ingress:
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
