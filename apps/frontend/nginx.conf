server {
    listen 80;
    server_name _;

    # Injecter l'URL de l'API depuis une variable d'environnement
    # La variable API_URL est substituée au démarrage du conteneur via envsubst
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Health check pour Kubernetes
    location /healthz {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
